<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Vault • Device Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(15, 23, 42, 0.02) 0%, #f1f5f9 100%);
        }
        .verif-card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .scan-ring {
            position: relative;
            width: 128px;
            height: 128px;
            background: #ffffff;
            border-radius: 64px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02), inset 0 1px 1px rgba(255,255,255,0.8);
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .scan-line {
            position: absolute;
            top: 8px;
            left: 16px;
            width: calc(100% - 32px);
            height: 3px;
            background: linear-gradient(90deg, transparent, #3b82f6, #60a5fa, #3b82f6, transparent);
            border-radius: 4px;
            filter: drop-shadow(0 0 6px #3b82f6);
            animation: scanMove 1.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) infinite alternate;
        }
        @keyframes scanMove {
            0% { top: 12px; opacity: 0.3; width: 40%; left: 30%;}
            20% { opacity: 1; width: 70%; left: 15%;}
            80% { opacity: 1; width: 70%; left: 15%;}
            100% { top: 104px; opacity: 0.4; width: 50%; left: 25%;}
        }
        .pulse-success {
            animation: pulseGreen 0.7s ease-out forwards;
        }
        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); transform: scale(1);}
            50% { box-shadow: 0 0 0 22px rgba(16, 185, 129, 0.2); transform: scale(1.02);}
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); transform: scale(1);}
        }
        .shake-error {
            animation: shakePanel 0.4s ease-in-out 0s 1;
        }
        @keyframes shakePanel {
            0%,100% { transform: translateX(0);}
            25% { transform: translateX(-6px);}
            75% { transform: translateX(6px);}
        }
        .progress-fill {
            transition: width 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .debug-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 8px;
            border-radius: 8px;
            z-index: 999;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        .debug-panel.show {
            display: block;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-5">

    <!-- Debug Panel (tap 5 times on screen to show) -->
    <div id="debugPanel" class="debug-panel">
        <div id="debugContent"></div>
    </div>

    <div class="fixed top-[-20%] left-[-10%] w-80 h-80 bg-blue-200/20 rounded-full blur-[70px] pointer-events-none"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-96 h-96 bg-emerald-200/15 rounded-full blur-[80px] pointer-events-none"></div>

    <div id="mainCard" class="verif-card rounded-3xl w-full max-w-sm p-7 text-center relative z-10 transition-all duration-500">
        <div class="text-[11px] font-extrabold text-slate-400 tracking-[.25em] mb-3">🔐 SECURE GATEWAY</div>
        
        <!-- Referral Info Banner -->
        <div id="referralBanner" class="hidden mb-4 p-3 rounded-xl bg-gradient-to-r from-purple-50 to-blue-50 border border-purple-200">
            <div class="flex items-center gap-2 text-left">
                <i class="fa-solid fa-gift text-purple-500 text-lg animate-pulse"></i>
                <div class="text-xs">
                    <p class="font-bold text-purple-700">🎉 Referral Detected!</p>
                    <p class="text-purple-600 text-[10px]" id="referralCodeDisplay">Processing...</p>
                </div>
            </div>
        </div>
        
        <div class="flex justify-center mb-5">
            <div id="scannerContainer" class="scan-ring flex items-center justify-center relative">
                <div id="scanLine" class="scan-line"></div>
                <i id="fingerIcon" class="fa-solid fa-shield-hooded text-5xl text-slate-300/80 transition-all duration-300"></i>
            </div>
        </div>

        <h2 id="statusTitle" class="text-2xl font-extrabold tracking-tight text-slate-800 mb-1.5">Device attestation</h2>
        <p id="statusDesc" class="text-xs font-semibold text-blue-500 uppercase tracking-wide flex items-center justify-center gap-1">
            <span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span>
            extracting hardware signature
        </p>

        <div class="mt-6 mb-1">
            <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div id="progressFill" class="progress-fill h-full bg-blue-500 rounded-full w-0"></div>
            </div>
        </div>
        <div class="text-[10px] text-slate-400 font-mono mt-2 opacity-70" id="stepHint">🔍 scanning TEE environment</div>
        
        <div class="mt-4 pt-3 border-t border-slate-100">
            <p class="text-[10px] text-slate-400">
                <i class="fa-solid fa-shield-heart mr-1"></i> Secure verification • ₹5 signup bonus
            </p>
        </div>
    </div>

    <div id="errorToast" class="fixed bottom-6 left-5 right-5 bg-white rounded-2xl p-5 shadow-2xl border-l-8 border-red-500 z-20 hidden translate-y-10 opacity-0 transition-all duration-400">
        <div class="flex items-start gap-3">
            <div class="bg-red-50 rounded-full w-10 h-10 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-lock text-red-500 text-xl"></i>
            </div>
            <div class="flex-1 text-left">
                <p class="font-black text-red-700 text-sm uppercase tracking-wide">verification failed</p>
                <p id="errorMsgText" class="text-slate-600 text-xs mt-1 leading-relaxed">Security protocol mismatch</p>
                <button id="closeErrorBtn" class="mt-3 w-full bg-slate-800 text-white text-xs font-bold py-2.5 rounded-xl active:scale-95 transition-all">✕ CLOSE & EXIT</button>
            </div>
        </div>
    </div>

    <div id="successToast" class="fixed bottom-6 left-5 right-5 bg-white rounded-2xl p-5 shadow-2xl border-l-8 border-emerald-500 z-20 hidden translate-y-10 opacity-0 transition-all duration-400">
        <div class="flex items-start gap-3">
            <div class="bg-emerald-50 rounded-full w-10 h-10 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-check-circle text-emerald-500 text-xl"></i>
            </div>
            <div class="flex-1 text-left">
                <p class="font-black text-emerald-700 text-sm uppercase tracking-wide">Verification Successful!</p>
                <p id="successMsgText" class="text-slate-600 text-xs mt-1 leading-relaxed">Redirecting to dashboard...</p>
            </div>
        </div>
    </div>

    <script>
        // Debug function
        let debugTapCount = 0;
        let debugTimeout;
        function addDebugLog(msg) {
            const debugContent = document.getElementById('debugContent');
            const timestamp = new Date().toLocaleTimeString();
            debugContent.innerHTML += `<div>[${timestamp}] ${msg}</div>`;
            debugContent.scrollTop = debugContent.scrollHeight;
            console.log(msg);
        }
        
        // Tap 5 times to show debug panel
        document.body.addEventListener('click', () => {
            debugTapCount++;
            clearTimeout(debugTimeout);
            debugTimeout = setTimeout(() => { debugTapCount = 0; }, 1000);
            if (debugTapCount >= 5) {
                document.getElementById('debugPanel').classList.toggle('show');
                debugTapCount = 0;
            }
        });
        
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#f1f5f9');
        
        addDebugLog("=== APP STARTED ===");
        addDebugLog("Telegram WebApp version: " + (tg.version || 'unknown'));
        
        let tg_id = null;
        let tg_username = null;
        let tg_first_name = null;
        let referralCode = null;
        
        // ========== GET REFERRAL CODE FROM ALL SOURCES ==========
        function getReferralCodeFromAllSources() {
            addDebugLog("Searching for referral code...");
            
            // 1. Check Telegram WebApp start_param (MOST IMPORTANT)
            if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
                const code = tg.initDataUnsafe.start_param;
                addDebugLog(`✅ Found in Telegram start_param: "${code}"`);
                return code;
            }
            
            // 2. Check URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            addDebugLog(`Full URL: ${window.location.href}`);
            addDebugLog(`URL Search: ${window.location.search}`);
            
            const paramNames = ['start', 'ref', 'referral', 'referral_code', 'ref_code'];
            
            for (const param of paramNames) {
                const code = urlParams.get(param);
                if (code && code.length > 0) {
                    addDebugLog(`✅ Found in URL param "${param}": "${code}"`);
                    return code;
                }
            }
            
            // 3. Check hash
            if (window.location.hash) {
                addDebugLog(`Hash found: ${window.location.hash}`);
                const hash = window.location.hash.substring(1);
                if (hash.includes('=')) {
                    const code = hash.split('=')[1];
                    addDebugLog(`✅ Found in hash: "${code}"`);
                    return code;
                }
            }
            
            addDebugLog("❌ No referral code found in any source");
            return null;
        }
        
        // Get user data from Telegram
        try {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                tg_id = tg.initDataUnsafe.user.id;
                tg_username = tg.initDataUnsafe.user.username || '';
                tg_first_name = tg.initDataUnsafe.user.first_name || 'User';
                addDebugLog(`User from Telegram: ID=${tg_id}, Name=${tg_first_name}, Username=${tg_username}`);
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                tg_id = urlParams.get('tg_id') || urlParams.get('id');
                tg_username = urlParams.get('username') || '';
                tg_first_name = urlParams.get('first_name') || 'User';
                addDebugLog(`User from URL: ID=${tg_id}, Name=${tg_first_name}`);
            }
        } catch(e) { 
            addDebugLog(`Error getting user: ${e.message}`);
        }
        
        // Get referral code
        referralCode = getReferralCodeFromAllSources();
        
        // Store in localStorage
        if (referralCode) {
            localStorage.setItem('pending_referral', referralCode);
            addDebugLog(`Saved referral to localStorage: ${referralCode}`);
        }
        
        // Show referral banner
        if (referralCode) {
            const banner = document.getElementById('referralBanner');
            banner.classList.remove('hidden');
            document.getElementById('referralCodeDisplay').innerHTML = `Using Referral: <strong>${referralCode}</strong><br>You'll get ₹5 + Referrer gets ₹5!`;
            document.getElementById('stepHint').innerHTML = `🎁 Referral Active: ${referralCode}`;
            addDebugLog(`Referral banner shown with code: ${referralCode}`);
        } else {
            addDebugLog(`No referral banner shown`);
        }

        const progressFill = document.getElementById('progressFill');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');
        const stepHint = document.getElementById('stepHint');
        const scannerContainer = document.getElementById('scannerContainer');
        const fingerIcon = document.getElementById('fingerIcon');
        const scanLine = document.getElementById('scanLine');
        const errorToast = document.getElementById('errorToast');
        const errorMsgText = document.getElementById('errorMsgText');
        const successToast = document.getElementById('successToast');
        const successMsgText = document.getElementById('successMsgText');
        const closeErrorBtn = document.getElementById('closeErrorBtn');

        function updateProgress(percent, textHint = null) {
            progressFill.style.width = `${Math.min(100, percent)}%`;
            if(textHint) stepHint.innerHTML = textHint;
        }

        function updateStatus(title, desc, isError = false) {
            statusTitle.innerText = title;
            statusDesc.innerHTML = desc;
            if(!isError) {
                statusTitle.classList.remove('text-red-600');
                statusTitle.classList.add('text-slate-800');
                statusDesc.classList.remove('text-red-500');
                statusDesc.classList.add('text-blue-500');
            } else {
                statusTitle.classList.remove('text-slate-800');
                statusTitle.classList.add('text-red-600');
                statusDesc.classList.remove('text-blue-500');
                statusDesc.classList.add('text-red-500');
            }
        }

        function showSuccess(message) {
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            successMsgText.innerText = message || "Redirecting to dashboard...";
            successToast.classList.remove('hidden', 'translate-y-10', 'opacity-0');
            setTimeout(() => {
                successToast.classList.remove('translate-y-10', 'opacity-0');
                successToast.classList.add('translate-y-0', 'opacity-100');
            }, 20);
        }

        function showFinalError(errorMessage) {
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            if(scanLine) scanLine.style.animation = 'none';
            scannerContainer.classList.add('border-red-200', 'bg-red-50/40');
            scannerContainer.classList.remove('border-slate-200');
            fingerIcon.classList.remove('text-slate-300');
            fingerIcon.classList.add('text-red-400');
            updateStatus('ACCESS DENIED', '<span class="inline-block w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse mr-1"></span> SYSTEM LOCK', true);
            updateProgress(100, '⛔ verification rejected');
            errorMsgText.innerText = errorMessage || "Invalid device fingerprint or session token. Please restart from the bot.";
            errorToast.classList.remove('hidden', 'translate-y-10', 'opacity-0');
            setTimeout(() => {
                errorToast.classList.remove('translate-y-10', 'opacity-0');
                errorToast.classList.add('translate-y-0', 'opacity-100');
            }, 20);
            document.getElementById('mainCard').classList.add('shake-error');
            setTimeout(() => document.getElementById('mainCard').classList.remove('shake-error'), 500);
        }

        function redirectToDashboard() {
            setTimeout(() => {
                window.location.href = 'https://cashadda.xyz/omni-cash//home';
            }, 2000);
        }

        function closeAppSafely() {
            try { tg.close(); } catch(e) { window.close(); }
        }

        function triggerSuccess() {
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            if(scanLine) scanLine.style.display = 'none';
            scannerContainer.classList.add('border-emerald-300', 'bg-emerald-50/60', 'pulse-success');
            fingerIcon.classList.remove('text-slate-300');
            fingerIcon.classList.add('text-emerald-500');
            fingerIcon.classList.replace('fa-shield-hooded', 'fa-circle-check');
            updateStatus('VERIFIED ✓', '<span class="text-emerald-500">secure channel established</span>', false);
            updateProgress(100, '✅ verification complete!');
            stepHint.style.opacity = '0.6';
            
            showSuccess('✓ Device verified! ₹5 bonus added to your account.');
            redirectToDashboard();
        }

        async function executeFullVerification() {
            updateProgress(18, '🌀 collecting entropy');
            setTimeout(() => updateProgress(32, '🔎 reading browser fingerprint'), 400);
            
            let ghostToken = localStorage.getItem('vault_ghost');
            if (!ghostToken) {
                ghostToken = 'VLT_' + (crypto.randomUUID ? crypto.randomUUID().slice(0,18) : Math.random().toString(36)+Date.now().toString(36));
                localStorage.setItem('vault_ghost', ghostToken);
            }
            
            const cores = navigator.hardwareConcurrency || 'unknown';
            const memory = navigator.deviceMemory || 'unknown';
            const platform = navigator.platform || navigator.userAgentData?.platform || 'unknown';
            const screenRes = `${screen.width}x${screen.height}`;
            const colorDepth = screen.colorDepth || 24;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown';
            const languages = navigator.language || 'en-US';
            
            updateProgress(48, '🧬 fingerprintjs engine');
            
            let fpHash = 'fallback_fp';
            try {
                const fpInstance = await FingerprintJS.load();
                const result = await fpInstance.get();
                fpHash = result.visitorId;
                updateProgress(65, '🔑 hashing device DNA');
            } catch(fpErr) {
                addDebugLog(`Fingerprint error: ${fpErr.message}`);
                fpHash = 'fp_fallback_' + Math.random().toString(36).substring(2, 12);
            }
            
            const rawString = `${fpHash}|${ghostToken}|${cores}|${memory}|${platform}|${screenRes}|${colorDepth}|${timezone}|${languages}`;
            let hashVal = 5381;
            for (let i = 0; i < rawString.length; i++) {
                hashVal = ((hashVal << 5) + hashVal) + rawString.charCodeAt(i);
                hashVal |= 0;
            }
            const uniqueDeviceSuffix = Math.abs(hashVal).toString(16).substring(0, 12);
            const finalDeviceId = `HW_${fpHash.substring(0, 10)}_${uniqueDeviceSuffix}`;
            
            updateProgress(82, '📡 contacting secure relay');
            
            if(!tg_id) {
                showFinalError("Missing Telegram user context. Please open via the bot interface.");
                return;
            }
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);
            
            try {
                // Build form data
                let formBody = `action=verify&tg_id=${encodeURIComponent(tg_id)}&tg_username=${encodeURIComponent(tg_username || '')}&tg_first_name=${encodeURIComponent(tg_first_name || '')}&device_id=${encodeURIComponent(finalDeviceId)}`;
                
                // CRITICAL: Add referral code
                if (referralCode && referralCode.length > 0) {
                    formBody += `&referral_code=${encodeURIComponent(referralCode)}`;
                    addDebugLog(`✅ ADDED referral_code to API request: ${referralCode}`);
                    updateProgress(85, `🎁 Referral: ${referralCode}`);
                } else {
                    addDebugLog(`⚠️ No referral_code to add to API request`);
                }
                
                addDebugLog(`Sending API request with body length: ${formBody.length}`);
                addDebugLog(`First 200 chars: ${formBody.substring(0, 200)}`);
                
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formBody,
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                const responseText = await response.text();
                addDebugLog(`API Response (raw): ${responseText.substring(0, 500)}`);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch(e) {
                    addDebugLog(`JSON parse error: ${e.message}`);
                    throw new Error('Invalid JSON response');
                }
                
                updateProgress(96, '⚡ validating signature');
                
                if (data && data.status === 'success') {
                    localStorage.setItem('authorized_device', finalDeviceId);
                    localStorage.setItem('verified_user', tg_id);
                    
                    if (referralCode) {
                        localStorage.removeItem('pending_referral');
                    }
                    
                    updateProgress(100, '✔️ verified');
                    
                    if (referralCode && data.is_new_user) {
                        addDebugLog(`✅ REFERRAL SUCCESS! User was new, referral applied.`);
                        showSuccess(`🎉 Success! You earned ₹5 bonus!`);
                    } else if (referralCode && !data.is_new_user) {
                        addDebugLog(`⚠️ Referral code provided but user already exists.`);
                        showSuccess(`✓ Welcome back!`);
                    } else {
                        addDebugLog(`ℹ️ No referral code used.`);
                    }
                    
                    triggerSuccess();
                } else {
                    addDebugLog(`API error: ${data?.msg || 'Unknown error'}`);
                    showFinalError(data?.msg || "Device not recognized");
                }
            } catch (err) {
                clearTimeout(timeoutId);
                addDebugLog(`Fetch error: ${err.message}`);
                showFinalError("Connection timeout. Please try again.");
            }
        }
        
        function startProgressSimulation() {
            let width = 0;
            const interval = setInterval(() => {
                if(width < 70) {
                    width += Math.floor(Math.random() * 6) + 2;
                    if(width > 70) width = 70;
                    progressFill.style.width = `${width}%`;
                } else {
                    clearInterval(interval);
                }
            }, 280);
            return interval;
        }
        
        setTimeout(() => updateProgress(10, '📡 activating TEE module'), 200);
        setTimeout(() => updateStatus('Device verification', '<span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse mr-1"></span> reading security enclave'), 500);
        
        const fakeInterval = startProgressSimulation();
        
        setTimeout(() => {
            clearInterval(fakeInterval);
            executeFullVerification().catch(err => {
                addDebugLog(`Verification error: ${err.message}`);
                showFinalError("Internal error: " + err.message);
            });
        }, 1500);
        
        closeErrorBtn.addEventListener('click', () => {
            errorToast.classList.add('translate-y-10', 'opacity-0');
            setTimeout(() => closeAppSafely(), 300);
        });
        
        console.log("=== REFERRAL DEBUG ===");
        console.log("Referral Code:", referralCode);
        console.log("Telegram User:", tg_id);
    </script>
</body>
</html>
